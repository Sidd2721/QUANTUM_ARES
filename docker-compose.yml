version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SQLITE_PATH=/data/quantum_ares.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-in-production}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - BLOCKCHAIN_MODE=rsa
      - PYTHONUNBUFFERED=1
    volumes:
      - quantum_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  quantum_data:
    driver: local
