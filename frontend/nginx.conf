# frontend/nginx.conf
# Nginx config for the frontend container.
# Proxies all /api/ calls to the backend service.
# Serves React SPA (index.html for all unmatched routes — required for React Router).

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to backend FastAPI service
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # Pipeline can take up to 30s — give timeout headroom
    }

    # Serve demo JSON fixture files (used in the 7-minute demo script)
    location /demo/ {
        alias /usr/share/nginx/html/demo/;
    }

    # React SPA routing — serve index.html for ALL frontend routes
    # Without this, refreshing /dashboard returns 404 from nginx
    location / {
        try_files $uri $uri/ /index.html;
    }
}
